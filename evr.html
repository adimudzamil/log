<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checklist Dashboard</title>
    <style>
        /* ── Reset & Base ── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f4f8;
            color: #1a2a3a;
            min-height: 100vh;
            padding: 0;
        }

        /* ── Header ── */
        .dashboard-header {
            background: linear-gradient(145deg, #0b1e2e, #1a344a);
            color: #fff;
            padding: 1.5rem 2rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.2);
        }

        .dashboard-header .brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .dashboard-header .brand h1 {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .dashboard-header .brand h1 span {
            color: #7bbaff;
        }

        .dashboard-header .brand .badge {
            font-size: 0.6rem;
            background: rgba(255, 255, 255, 0.12);
            padding: 0.15rem 0.7rem;
            border-radius: 100px;
            color: #9bc9ff;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .header-controls {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.5rem;
        }

        .header-controls .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.4rem 1rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.78rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .header-controls .btn:hover {
            background: rgba(255, 255, 255, 0.18);
            transform: translateY(-1px);
        }

        .header-controls .btn-primary {
            background: #7bbaff;
            color: #0b1e2e;
        }

        .header-controls .btn-primary:hover {
            background: #9acbff;
        }

        .header-controls .btn-outline {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .header-controls .btn-outline:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .header-controls .btn-danger {
            background: rgba(255, 80, 80, 0.2);
            border-color: rgba(255, 80, 80, 0.3);
        }
        .header-controls .btn-danger:hover {
            background: rgba(255, 80, 80, 0.35);
        }

        .header-controls .tab-count {
            font-size: 0.7rem;
            opacity: 0.6;
            padding: 0.2rem 0.6rem;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 100px;
        }

        /* ── Tab Bar ── */
        .tab-bar-wrapper {
            background: #fff;
            border-bottom: 1px solid #e9edf2;
            position: sticky;
            top: 72px;
            z-index: 99;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            overflow: hidden;
        }

        .tab-bar {
            display: flex;
            overflow-x: auto;
            padding: 0 1rem;
            gap: 0.15rem;
            scrollbar-width: thin;
            scrollbar-color: #d0d7e0 transparent;
            -webkit-overflow-scrolling: touch;
        }

        .tab-bar::-webkit-scrollbar {
            height: 4px;
        }
        .tab-bar::-webkit-scrollbar-track {
            background: transparent;
        }
        .tab-bar::-webkit-scrollbar-thumb {
            background: #d0d7e0;
            border-radius: 10px;
        }

        .tab-item {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.65rem 1rem 0.6rem;
            font-size: 0.82rem;
            font-weight: 500;
            color: #4a5a6a;
            background: transparent;
            border: none;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
            font-family: inherit;
            position: relative;
            flex-shrink: 0;
        }

        .tab-item:hover {
            color: #1a2a3a;
            background: #f7f9fc;
        }

        .tab-item.active {
            color: #1a344a;
            border-bottom-color: #1a344a;
            font-weight: 600;
            background: #f7f9fc;
        }

        .tab-item .tab-label {
            pointer-events: none;
        }

        .tab-item .hide-btn {
            background: none;
            border: none;
            font-size: 0.6rem;
            color: #b0c4d4;
            cursor: pointer;
            padding: 0 0.15rem;
            transition: color 0.2s;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            width: 18px;
            height: 18px;
        }

        .tab-item .hide-btn:hover {
            color: #e05050;
            background: rgba(224, 80, 80, 0.08);
        }

        .tab-item .tab-type-badge {
            font-size: 0.5rem;
            background: #eef2f7;
            padding: 0.05rem 0.4rem;
            border-radius: 100px;
            color: #7a8fa0;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            pointer-events: none;
        }

        .tab-item .tab-type-badge.link {
            background: #e3f0fa;
            color: #2a6b8a;
        }

        .tab-item .tab-type-badge.report {
            background: #e6f4ea;
            color: #1a6a4a;
        }

        .tab-item .tab-type-badge.placeholder {
            background: #f2f2f2;
            color: #8a8a8a;
        }

        .empty-tabs {
            padding: 1.5rem;
            text-align: center;
            color: #8a9aa8;
            font-size: 0.9rem;
            width: 100%;
        }

        .empty-tabs .big-icon {
            font-size: 2rem;
            display: block;
            margin-bottom: 0.5rem;
        }

        /* ── Content Area ── */
        .content-area {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
            min-height: calc(100vh - 180px);
        }

        .content-panel {
            display: none;
            animation: fadeUp 0.3s ease;
        }

        .content-panel.active {
            display: block;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .content-panel h2 {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
            color: #1a2a3a;
        }

        .content-panel .subtitle {
            color: #7a8fa0;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid #eef2f7;
            padding-bottom: 0.75rem;
        }

        /* ── Report Panel ── */
        .report-panel textarea {
            width: 100%;
            min-height: 280px;
            padding: 1rem 1.25rem;
            border: 1.5px solid #e2e8ef;
            border-radius: 12px;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 0.92rem;
            line-height: 1.6;
            resize: vertical;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: #fafcfe;
            color: #1a2a3a;
            outline: none;
        }

        .report-panel textarea:focus {
            border-color: #4a8fc7;
            box-shadow: 0 0 0 4px rgba(74, 143, 199, 0.08);
            background: #fff;
        }

        .report-panel textarea::placeholder {
            color: #b0c4d4;
        }

        .report-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            margin-top: 1rem;
            align-items: center;
        }

        .report-actions .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.5rem 1.2rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.82rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .report-actions .btn-copy {
            background: #1a344a;
            color: #fff;
        }
        .report-actions .btn-copy:hover {
            background: #0f2638;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(26, 52, 74, 0.25);
        }

        .report-actions .btn-clear {
            background: #eef2f7;
            color: #4a5a6a;
        }
        .report-actions .btn-clear:hover {
            background: #e2e8ef;
        }

        .report-actions .btn-save {
            background: #0f7b4a;
            color: #fff;
        }
        .report-actions .btn-save:hover {
            background: #0b663b;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(15, 123, 74, 0.25);
        }

        .report-actions .toast-msg {
            font-size: 0.8rem;
            color: #0f7b4a;
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .report-actions .toast-msg.show {
            opacity: 1;
        }

        /* ── Link Panel ── */
        .link-panel {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .link-panel .link-card {
            background: #fafcfe;
            border: 1.5px solid #e9edf2;
            border-radius: 14px;
            padding: 1.5rem 2rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .link-panel .link-card .url-display {
            font-family: 'SF Mono', 'Menlo', 'Monaco', 'Courier New', monospace;
            font-size: 0.82rem;
            color: #4a5a6a;
            word-break: break-all;
            background: #f2f6fa;
            padding: 0.3rem 0.8rem;
            border-radius: 6px;
            flex: 1;
            min-width: 150px;
        }

        .link-panel .link-card .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1.4rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.82rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            background: #1a344a;
            color: #fff;
            text-decoration: none;
        }

        .link-panel .link-card .btn:hover {
            background: #0f2638;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(26, 52, 74, 0.25);
        }

        .link-panel .link-card .btn .ext-icon {
            font-size: 0.7rem;
        }

        /* ── Placeholder Panel ── */
        .placeholder-panel {
            text-align: center;
            padding: 4rem 2rem;
            background: #fafcfe;
            border-radius: 16px;
            border: 1.5px dashed #dce2ea;
        }

        .placeholder-panel .big-icon {
            font-size: 3rem;
            display: block;
            margin-bottom: 1rem;
        }

        .placeholder-panel h3 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #4a5a6a;
        }

        .placeholder-panel p {
            color: #8a9aa8;
            font-size: 0.9rem;
            margin-top: 0.3rem;
        }

        /* ── Settings Modal ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 200;
            background: rgba(10, 20, 30, 0.5);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: #fff;
            border-radius: 20px;
            max-width: 560px;
            width: 100%;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 32px 80px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.25rem 1.75rem;
            border-bottom: 1px solid #eef2f7;
            flex-shrink: 0;
        }

        .modal-header h2 {
            font-size: 1.1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .modal-header .close-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #8a9aa8;
            padding: 0.2rem 0.5rem;
            border-radius: 6px;
            transition: background 0.2s;
        }

        .modal-header .close-btn:hover {
            background: #f0f4f8;
        }

        .modal-body {
            padding: 1.25rem 1.75rem 1.75rem;
            overflow-y: auto;
            flex: 1;
        }

        .modal-body .modal-actions {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .modal-body .modal-actions .btn {
            padding: 0.35rem 1rem;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.78rem;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }

        .modal-body .modal-actions .btn-sm {
            background: #eef2f7;
            color: #1a2a3a;
        }
        .modal-body .modal-actions .btn-sm:hover {
            background: #e2e8ef;
        }

        .modal-body .modal-actions .btn-primary-sm {
            background: #1a344a;
            color: #fff;
        }
        .modal-body .modal-actions .btn-primary-sm:hover {
            background: #0f2638;
        }

        .visibility-list {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .visibility-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.5rem 0.75rem;
            border-radius: 8px;
            transition: background 0.15s;
            cursor: default;
        }

        .visibility-item:hover {
            background: #f7f9fc;
        }

        .visibility-item .v-label {
            flex: 1;
            font-size: 0.85rem;
            font-weight: 500;
            color: #1a2a3a;
        }

        .visibility-item .v-badge {
            font-size: 0.55rem;
            background: #eef2f7;
            padding: 0.05rem 0.5rem;
            border-radius: 100px;
            color: #7a8fa0;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .visibility-item .v-badge.link {
            background: #e3f0fa;
            color: #2a6b8a;
        }
        .visibility-item .v-badge.report {
            background: #e6f4ea;
            color: #1a6a4a;
        }
        .visibility-item .v-badge.placeholder {
            background: #f2f2f2;
            color: #8a8a8a;
        }

        /* Toggle switch */
        .toggle-switch {
            position: relative;
            width: 40px;
            height: 22px;
            flex-shrink: 0;
            cursor: pointer;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
            position: absolute;
        }

        .toggle-switch .slider {
            position: absolute;
            inset: 0;
            background: #dce2ea;
            border-radius: 100px;
            transition: background 0.25s ease;
        }

        .toggle-switch .slider::before {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            left: 3px;
            bottom: 3px;
            background: #fff;
            border-radius: 50%;
            transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.15);
        }

        .toggle-switch input:checked+.slider {
            background: #0f7b4a;
        }

        .toggle-switch input:checked+.slider::before {
            transform: translateX(18px);
        }

        /* ── Toast ── */
        .toast-global {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #1a2a3a;
            color: #fff;
            padding: 0.6rem 1.8rem;
            border-radius: 12px;
            font-weight: 500;
            font-size: 0.85rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 300;
            pointer-events: none;
        }

        .toast-global.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .dashboard-header {
                padding: 1rem 1.25rem;
                flex-direction: column;
                align-items: stretch;
                gap: 0.75rem;
            }

            .dashboard-header .brand h1 {
                font-size: 1.1rem;
            }

            .header-controls {
                justify-content: flex-start;
                flex-wrap: wrap;
            }

            .header-controls .btn {
                font-size: 0.7rem;
                padding: 0.3rem 0.7rem;
            }

            .tab-bar {
                padding: 0 0.5rem;
                gap: 0.05rem;
            }

            .tab-item {
                font-size: 0.72rem;
                padding: 0.5rem 0.6rem;
            }

            .tab-item .tab-type-badge {
                display: none;
            }

            .content-area {
                padding: 1.25rem 1rem;
            }

            .content-panel h2 {
                font-size: 1.1rem;
            }

            .report-panel textarea {
                min-height: 180px;
                font-size: 0.85rem;
                padding: 0.75rem 1rem;
            }

            .report-actions .btn {
                font-size: 0.75rem;
                padding: 0.4rem 0.9rem;
            }

            .link-panel .link-card {
                flex-direction: column;
                align-items: stretch;
                padding: 1.25rem;
            }

            .link-panel .link-card .url-display {
                font-size: 0.75rem;
            }

            .modal {
                max-width: 100%;
                border-radius: 16px;
                margin: 0.5rem;
                max-height: 90vh;
            }

            .modal-header {
                padding: 1rem 1.25rem;
            }
            .modal-body {
                padding: 1rem 1.25rem 1.5rem;
            }

            .visibility-item {
                padding: 0.4rem 0.5rem;
                flex-wrap: wrap;
                gap: 0.3rem;
            }

            .visibility-item .v-label {
                font-size: 0.8rem;
                flex: 1 1 100%;
            }

            .tab-bar-wrapper {
                top: 112px;
            }
        }

        @media (max-width: 480px) {
            .tab-bar-wrapper {
                top: 130px;
            }

            .header-controls .tab-count {
                font-size: 0.6rem;
                padding: 0.1rem 0.4rem;
            }
        }
    </style>
</head>
<body>

    <!-- ─── HEADER ─── -->
    <header class="dashboard-header">
        <div class="brand">
            <h1>📋 <span>Checklist</span> Dashboard</h1>
            <span class="badge">v2.0</span>
        </div>
        <div class="header-controls">
            <span class="tab-count" id="tabCount">22 tabs</span>
            <button class="btn btn-outline" id="showAllBtn">👁️ Show All</button>
            <button class="btn btn-outline" id="hideAllBtn">🚫 Hide All</button>
            <button class="btn btn-primary" id="settingsBtn">⚙️ Manage</button>
        </div>
    </header>

    <!-- ─── TAB BAR ─── -->
    <div class="tab-bar-wrapper">
        <div class="tab-bar" id="tabBar">
            <!-- rendered by JS -->
        </div>
    </div>

    <!-- ─── CONTENT AREA ─── -->
    <main class="content-area" id="contentArea">
        <!-- rendered by JS -->
    </main>

    <!-- ─── SETTINGS MODAL ─── -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <div class="modal-header">
                <h2>⚙️ Manage Tabs</h2>
                <button class="close-btn" id="closeSettingsBtn">✕</button>
            </div>
            <div class="modal-body">
                <div class="modal-actions">
                    <button class="btn btn-primary-sm" id="modalShowAll">👁️ Show All</button>
                    <button class="btn btn-sm" id="modalHideAll">🚫 Hide All</button>
                </div>
                <div class="visibility-list" id="visibilityList">
                    <!-- rendered by JS -->
                </div>
            </div>
        </div>
    </div>

    <!-- ─── TOAST ─── -->
    <div class="toast-global" id="toastGlobal"></div>

    <script>
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  DATA
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        const CHECKLISTS = [

            { id: 5, type: 'report', label: 'Checklist 5' },
            { id: 6, type: 'report', label: 'Checklist 6' },
            { id: 7, type: 'report', label: 'Checklist 7' },
            { id: 8, type: 'report', label: 'Checklist 8' },
            { id: 9, type: 'report', label: 'Checklist 9' },
            { id: 10, type: 'report', label: 'Checklist 10' },
            { id: 11, type: 'report', label: 'Checklist 11' },
            { id: 12, type: 'report', label: 'Checklist 12' },
            { id: 13, type: 'report', label: 'Checklist 13' },
            { id: 14, type: 'report', label: 'Checklist 14' },
            { id: 15, type: 'report', label: 'Checklist 15' },
            { id: 16, type: 'report', label: 'Checklist 16' },
            { id: 17, type: 'report', label: 'Checklist 17' },
            { id: 18, type: 'placeholder', label: 'Checklist 18' },
            { id: 19, type: 'placeholder', label: 'Checklist 19' },
            { id: 20, type: 'placeholder', label: 'Checklist 20' },
            { id: 21, type: 'placeholder', label: 'Checklist 21' },
            { id: 22, type: 'placeholder', label: 'Checklist 22' },
        ];

        const STORAGE_KEY = 'dashboard_tab_visibility';
        const REPORT_PREFIX = 'dashboard_report_';

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  STATE
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        let activeTabId = 1;
        let visibleIds = [];

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  DOM REFS
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        const tabBar = document.getElementById('tabBar');
        const contentArea = document.getElementById('contentArea');
        const settingsModal = document.getElementById('settingsModal');
        const visibilityList = document.getElementById('visibilityList');
        const toastGlobal = document.getElementById('toastGlobal');
        const tabCount = document.getElementById('tabCount');

        const showAllBtn = document.getElementById('showAllBtn');
        const hideAllBtn = document.getElementById('hideAllBtn');
        const settingsBtn = document.getElementById('settingsBtn');
        const closeSettingsBtn = document.getElementById('closeSettingsBtn');
        const modalShowAll = document.getElementById('modalShowAll');
        const modalHideAll = document.getElementById('modalHideAll');

        let toastTimer = null;

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  HELPERS
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        function getVisibility() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                try {
                    const parsed = JSON.parse(stored);
                    if (Array.isArray(parsed) && parsed.length) return parsed;
                } catch (_) { /* ignore */ }
            }
            // default: all visible
            return CHECKLISTS.map(c => c.id);
        }

        function saveVisibility(ids) {
            visibleIds = ids;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(ids));
        }

        function getReportKey(id) { return REPORT_PREFIX + id; }

        function getReportText(id) {
            return localStorage.getItem(getReportKey(id)) || '';
        }

        function saveReportText(id, text) {
            localStorage.setItem(getReportKey(id), text);
        }

        function getTypeBadge(type) {
            const map = {
                report: '📝 report',
                link: '🔗 link',
                placeholder: '⏳ soon'
            };
            return map[type] || type;
        }

        function getTypeClass(type) {
            return type;
        }

        function showToast(msg) {
            toastGlobal.textContent = msg;
            toastGlobal.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => {
                toastGlobal.classList.remove('show');
            }, 2200);
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  RENDER
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        function render() {
            renderTabBar();
            renderContent();
            renderVisibilityList();
            updateTabCount();
        }

        function renderTabBar() {
            const visible = CHECKLISTS.filter(c => visibleIds.includes(c.id));

            if (visible.length === 0) {
                tabBar.innerHTML = `
                    <div class="empty-tabs">
                        <span class="big-icon">👀</span>
                        All tabs are hidden. Use "Show All" or "Manage" to bring them back.
                    </div>
                `;
                return;
            }

            let html = '';
            visible.forEach(c => {
                const isActive = c.id === activeTabId;
                const badge = getTypeBadge(c.type);
                const badgeClass = getTypeClass(c.type);
                html += `
                    <button class="tab-item ${isActive ? 'active' : ''}" data-id="${c.id}">
                        <span class="tab-label">${c.label}</span>
                        <span class="tab-type-badge ${badgeClass}">${badge}</span>
                        <button class="hide-btn" data-id="${c.id}" title="Hide this tab">✕</button>
                    </button>
                `;
            });
            tabBar.innerHTML = html;

            // Tab click → switch
            tabBar.querySelectorAll('.tab-item').forEach(el => {
                el.addEventListener('click', function(e) {
                    // ignore if click on hide-btn
                    if (e.target.closest('.hide-btn')) return;
                    const id = parseInt(this.dataset.id);
                    if (!isNaN(id) && id !== activeTabId) {
                        activeTabId = id;
                        render();
                    }
                });
            });

            // Hide button
            tabBar.querySelectorAll('.hide-btn').forEach(el => {
                el.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const id = parseInt(this.dataset.id);
                    if (!isNaN(id)) {
                        hideTab(id);
                    }
                });
            });

            // If active tab is hidden, switch to first visible
            if (!visibleIds.includes(activeTabId) && visible.length > 0) {
                activeTabId = visible[0].id;
                render();
            } else if (visible.length === 0) {
                activeTabId = null;
            }
        }

        function renderContent() {
            if (!activeTabId || !visibleIds.includes(activeTabId)) {
                if (visibleIds.length > 0) {
                    activeTabId = visibleIds[0];
                    render();
                    return;
                }
                contentArea.innerHTML = `
                    <div class="placeholder-panel" style="margin-top:2rem;">
                        <span class="big-icon">👀</span>
                        <h3>No tabs visible</h3>
                        <p>Use "Show All" or open "Manage" to show tabs.</p>
                    </div>
                `;
                return;
            }

            const checklist = CHECKLISTS.find(c => c.id === activeTabId);
            if (!checklist) {
                contentArea.innerHTML = `<p>Checklist not found.</p>`;
                return;
            }

            let html = '';
            const isActive = true;

            if (checklist.type === 'report') {
                const text = getReportText(checklist.id);
                html = `
                    <div class="content-panel active report-panel">
                        <h2>${checklist.label}</h2>
                        <div class="subtitle">✏️ Type your report below. Text is auto‑saved.</div>
                        <textarea id="reportTextarea" data-id="${checklist.id}" placeholder="Write your report here…">${text}</textarea>
                        <div class="report-actions">
                            <button class="btn btn-copy" id="copyReportBtn">📄 Copy</button>
                            <button class="btn btn-save" id="saveReportBtn">💾 Save</button>
                            <button class="btn btn-clear" id="clearReportBtn">🗑️ Clear</button>
                            <span class="toast-msg" id="reportToast"></span>
                        </div>
                    </div>
                `;
            } else if (checklist.type === 'link') {
                html = `
                    <div class="content-panel active link-panel">
                        <h2>${checklist.label}</h2>
                        <div class="subtitle">🔗 Opens in a new tab</div>
                        <div class="link-card">
                            <span class="url-display">${checklist.url}</span>
                            <a href="${checklist.url}" target="_blank" rel="noopener noreferrer" class="btn">
                                Open <span class="ext-icon">↗</span>
                            </a>
                        </div>
                    </div>
                `;
            } else {
                // placeholder
                html = `
                    <div class="content-panel active placeholder-panel">
                        <span class="big-icon">🚧</span>
                        <h3>${checklist.label}</h3>
                        <p>This checklist is coming soon.</p>
                    </div>
                `;
            }

            contentArea.innerHTML = html;

            // ── Report events ──
            if (checklist.type === 'report') {
                const textarea = document.getElementById('reportTextarea');
                const copyBtn = document.getElementById('copyReportBtn');
                const saveBtn = document.getElementById('saveReportBtn');
                const clearBtn = document.getElementById('clearReportBtn');
                const toastMsg = document.getElementById('reportToast');

                // Auto-save on input
                textarea.addEventListener('input', function() {
                    saveReportText(checklist.id, this.value);
                });

                // Copy
                copyBtn.addEventListener('click', function() {
                    const val = textarea.value;
                    if (!val.trim()) {
                        toastMsg.textContent = '⚠️ Nothing to copy.';
                        toastMsg.classList.add('show');
                        setTimeout(() => toastMsg.classList.remove('show'), 1500);
                        return;
                    }
                    navigator.clipboard.writeText(val).then(() => {
                        toastMsg.textContent = '✅ Copied to clipboard!';
                        toastMsg.classList.add('show');
                        setTimeout(() => toastMsg.classList.remove('show'), 1800);
                    }).catch(() => {
                        // fallback
                        textarea.select();
                        document.execCommand('copy');
                        toastMsg.textContent = '✅ Copied!';
                        toastMsg.classList.add('show');
                        setTimeout(() => toastMsg.classList.remove('show'), 1500);
                    });
                });

                // Save
                saveBtn.addEventListener('click', function() {
                    saveReportText(checklist.id, textarea.value);
                    toastMsg.textContent = '💾 Saved!';
                    toastMsg.classList.add('show');
                    setTimeout(() => toastMsg.classList.remove('show'), 1200);
                });

                // Clear
                clearBtn.addEventListener('click', function() {
                    if (!confirm(`Clear all text for ${checklist.label}?`)) return;
                    textarea.value = '';
                    saveReportText(checklist.id, '');
                    toastMsg.textContent = '🗑️ Cleared.';
                    toastMsg.classList.add('show');
                    setTimeout(() => toastMsg.classList.remove('show'), 1200);
                });
            }
        }

        function renderVisibilityList() {
            let html = '';
            CHECKLISTS.forEach(c => {
                const isVisible = visibleIds.includes(c.id);
                const badge = getTypeBadge(c.type);
                const badgeClass = getTypeClass(c.type);
                html += `
                    <div class="visibility-item" data-id="${c.id}">
                        <span class="v-label">${c.label}</span>
                        <span class="v-badge ${badgeClass}">${badge}</span>
                        <label class="toggle-switch">
                            <input type="checkbox" class="vis-toggle" data-id="${c.id}" ${isVisible ? 'checked' : ''} />
                            <span class="slider"></span>
                        </label>
                    </div>
                `;
            });
            visibilityList.innerHTML = html;

            // Toggle events
            visibilityList.querySelectorAll('.vis-toggle').forEach(el => {
                el.addEventListener('change', function() {
                    const id = parseInt(this.dataset.id);
                    if (isNaN(id)) return;
                    if (this.checked) {
                        if (!visibleIds.includes(id)) {
                            visibleIds.push(id);
                            saveVisibility(visibleIds);
                        }
                    } else {
                        visibleIds = visibleIds.filter(v => v !== id);
                        saveVisibility(visibleIds);
                        // if active tab is hidden, switch
                        if (activeTabId === id) {
                            activeTabId = visibleIds.length > 0 ? visibleIds[0] : null;
                        }
                    }
                    render();
                    updateTabCount();
                });
            });
        }

        function updateTabCount() {
            const visible = CHECKLISTS.filter(c => visibleIds.includes(c.id));
            tabCount.textContent = `${visible.length} / ${CHECKLISTS.length} tabs`;
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  ACTIONS
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        function hideTab(id) {
            visibleIds = visibleIds.filter(v => v !== id);
            saveVisibility(visibleIds);
            if (activeTabId === id) {
                activeTabId = visibleIds.length > 0 ? visibleIds[0] : null;
            }
            render();
            updateTabCount();
            showToast(`🗂️ Tab hidden`);
        }

        function showAllTabs() {
            visibleIds = CHECKLISTS.map(c => c.id);
            saveVisibility(visibleIds);
            if (!activeTabId || !visibleIds.includes(activeTabId)) {
                activeTabId = visibleIds[0] || null;
            }
            render();
            updateTabCount();
            showToast('👁️ All tabs shown');
        }

        function hideAllTabs() {
            visibleIds = [];
            saveVisibility(visibleIds);
            activeTabId = null;
            render();
            updateTabCount();
            showToast('🚫 All tabs hidden');
        }

        function openSettings() {
            renderVisibilityList();
            settingsModal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeSettings() {
            settingsModal.classList.remove('active');
            document.body.style.overflow = '';
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  INIT
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        function init() {
            visibleIds = getVisibility();
            // Ensure at least one tab visible
            if (visibleIds.length === 0) {
                visibleIds = [CHECKLISTS[0].id];
                saveVisibility(visibleIds);
            }
            // Set active tab to first visible or stored
            const storedActive = parseInt(localStorage.getItem('dashboard_active_tab'));
            if (storedActive && visibleIds.includes(storedActive)) {
                activeTabId = storedActive;
            } else {
                activeTabId = visibleIds[0];
            }
            render();
            updateTabCount();

            // ── Event listeners ──
            showAllBtn.addEventListener('click', showAllTabs);
            hideAllBtn.addEventListener('click', hideAllTabs);
            settingsBtn.addEventListener('click', openSettings);
            closeSettingsBtn.addEventListener('click', closeSettings);
            modalShowAll.addEventListener('click', showAllTabs);
            modalHideAll.addEventListener('click', hideAllTabs);

            // Close modal on overlay click
            settingsModal.addEventListener('click', function(e) {
                if (e.target === this) closeSettings();
            });

            // Escape key
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') closeSettings();
            });

            // Save active tab on change
            document.addEventListener('click', function() {
                if (activeTabId) {
                    localStorage.setItem('dashboard_active_tab', String(activeTabId));
                }
            });

            console.log('📋 Dashboard ready');
        }

        // ── Start ──
        document.addEventListener('DOMContentLoaded', init);
    </script>

</body>
</html>
