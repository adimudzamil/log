<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Checklist 22 – Flight + Water Monitor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
        /* ══════════════════════════════════════════
           THEME VARIABLES (mirroring dashboard)
        ══════════════════════════════════════════ */
        :root {
            --bg: #F4F7FB;
            --surface: #FFFFFF;
            --surface2: #EEF3FA;
            --border: #D6E0EF;
            --border2: #C0CFDF;
            --text: #0D1F3C;
            --text2: #4A6280;
            --text3: #8FA3BC;
            --navy: #003580;
            --navy2: #001F4E;
            --navy3: #00418A;
            --gold: #C9A84C;
            --gold2: #E8C96A;
            --shadow: 0 2px 12px rgba(0, 31, 78, 0.08);
            --shadow2: 0 8px 30px rgba(0, 31, 78, 0.12);
            --radius: 14px;
            --radius-sm: 10px;
            --transition: 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
            --danger: #D32F2F;
        }

        /* ── Dark ── */
        [data-theme="dark"] {
            --bg: #0D1525;
            --surface: #162035;
            --surface2: #1C2A42;
            --border: #243350;
            --border2: #2E4070;
            --text: #E8EEF7;
            --text2: #8FA3BC;
            --text3: #4A6280;
            --shadow: 0 2px 12px rgba(0, 0, 0, .3);
            --shadow2: 0 8px 30px rgba(0, 0, 0, .4);
            --danger: #EF5350;
        }

        /* ── Black ── */
        [data-theme="black"] {
            --bg: #000;
            --surface: #0A0A0A;
            --surface2: #111;
            --border: #1A1A1A;
            --border2: #222;
            --text: #F0F0F0;
            --text2: #888;
            --text3: #444;
            --shadow: 0 2px 12px rgba(0, 0, 0, .6);
            --shadow2: 0 8px 30px rgba(0, 0, 0, .8);
            --danger: #FF6B6B;
        }

        /* ── Modern ── */
        [data-theme="modern"] {
            --navy: #1D4ED8;
            --navy2: #1E3A8A;
            --navy3: #2563EB;
            --gold: #F59E0B;
            --gold2: #FCD34D;
        }

        /* ── Jarvis ── */
        [data-theme="jarvis"] {
            --bg: #0A0E1A;
            --surface: #111827;
            --surface2: #1A2332;
            --border: #2D3A4F;
            --border2: #3B4D6B;
            --text: #E2E8F0;
            --text2: #94A3B8;
            --text3: #475569;
            --navy: #00B4D8;
            --navy2: #0077B6;
            --navy3: #00B4D8;
            --gold: #00E5FF;
            --gold2: #4DD0E1;
            --shadow: 0 2px 12px rgba(0, 180, 216, 0.15);
            --shadow2: 0 8px 30px rgba(0, 180, 216, 0.2);
            --danger: #FF6B6B;
        }

        /* ── Cyberpunk ── */
        [data-theme="cyberpunk"] {
            --bg: #0B0A0F;
            --surface: #1A1425;
            --surface2: #251F33;
            --border: #3A2D4A;
            --border2: #5A3D6A;
            --text: #F0E6FF;
            --text2: #B89FD0;
            --text3: #6A4F7A;
            --navy: #FF007F;
            --navy2: #CC0066;
            --navy3: #FF2E9C;
            --gold: #00FFD1;
            --gold2: #66FFE0;
            --shadow: 0 2px 12px rgba(255, 0, 127, 0.2);
            --shadow2: 0 8px 30px rgba(255, 0, 127, 0.25);
            --danger: #FF4D8C;
        }

        /* ══════════════════════════════════════════
           RESET & BASE
        ══════════════════════════════════════════ */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            transition: background var(--transition), color var(--transition);
            -webkit-font-smoothing: antialiased;
        }

        /* ══════════════════════════════════════════
           MAIN CARD
        ══════════════════════════════════════════ */
        .container {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow2);
            padding: 24px 20px 28px;
            max-width: 720px;
            width: 100%;
            transition: background var(--transition), border-color var(--transition);
        }

        .header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            gap: 8px;
        }
        .header h1 {
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            color: var(--text);
        }
        .header h1 em {
            color: var(--gold);
            font-style: normal;
        }
        .header .sub {
            font-size: 0.7rem;
            color: var(--text3);
            font-weight: 500;
            letter-spacing: 0.04em;
        }

        /* ── Flight Selector ── */
        .flight-selector {
            background: var(--surface2);
            border-radius: var(--radius-sm);
            padding: 12px 14px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
            border: 1px solid var(--border);
            transition: border-color var(--transition);
        }
        .flight-selector label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text2);
            letter-spacing: 0.03em;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .flight-selector input,
        .flight-selector select {
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            padding: 6px 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            transition: border-color var(--transition), box-shadow var(--transition);
            outline: none;
            min-width: 100px;
            flex: 1 1 120px;
        }
        /* Give the aircraft dropdown more grow priority */
        .flight-selector select {
            flex: 2 1 140px;
            min-width: 110px;
        }
        .flight-selector input:focus,
        .flight-selector select:focus {
            border-color: var(--navy);
            box-shadow: 0 0 0 3px rgba(0, 53, 128, 0.10);
        }
        .flight-selector input::placeholder {
            color: var(--text3);
            font-weight: 400;
        }
        .flight-selector .req-badge {
            font-size: 0.7rem;
            font-weight: 700;
            background: var(--navy);
            color: #fff;
            padding: 3px 12px;
            border-radius: 30px;
            white-space: nowrap;
            letter-spacing: 0.02em;
            margin-left: auto;
        }
        .flight-selector .req-badge.na {
            background: var(--text3);
        }
        .flight-selector .btn-check {
            background: var(--gold);
            color: var(--navy2);
            border: none;
            border-radius: 30px;
            padding: 6px 16px;
            font-weight: 700;
            font-size: 0.75rem;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all var(--transition);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .flight-selector .btn-check:hover {
            background: var(--gold2);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }
        .flight-selector .btn-check:active {
            transform: translateY(0);
        }

        /* ══════════════════════════════════════════
           TANK GRID
        ══════════════════════════════════════════ */
        .tank-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }

        .tank {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .tank-label {
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--text2);
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .tank-label .icon {
            font-size: 1rem;
        }
        .tank-label .req-text {
            font-size: 0.6rem;
            font-weight: 600;
            color: var(--text3);
            background: var(--surface2);
            padding: 0 8px;
            border-radius: 12px;
            border: 1px solid var(--border);
            letter-spacing: 0.02em;
        }
        .tank-value {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 8px;
            transition: color var(--transition);
            letter-spacing: -0.02em;
            background: var(--surface2);
            padding: 2px 12px;
            border-radius: 20px;
            border: 1px solid var(--border);
            min-width: 64px;
            text-align: center;
        }
        .tank-value.warning {
            color: var(--danger);
            border-color: var(--danger);
        }

        /* ── Slider Track ── */
        .slider-wrapper {
            position: relative;
            width: 48px;
            height: 240px;
            background: var(--surface2);
            border-radius: 30px;
            border: 2px solid var(--border);
            cursor: pointer;
            touch-action: none;
            user-select: none;
            transition: border-color var(--transition);
            box-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.04);
        }
        .slider-wrapper:hover {
            border-color: var(--navy);
        }

        .slider-fill {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            border-radius: 0 0 28px 28px;
            background: linear-gradient(180deg, var(--water-light, #7BC8F0), var(--water-color, #1A85C7));
            transition: height 0.05s linear, background var(--transition);
            overflow: hidden;
            will-change: height;
            min-height: 4px;
        }
        .slider-fill .wave {
            position: absolute;
            top: -8px;
            left: -10%;
            right: -10%;
            height: 20px;
            background: radial-gradient(ellipse at 30% 50%, rgba(255, 255, 255, 0.25) 0%, transparent 60%);
            border-radius: 50% 50% 0 0 / 100% 100% 0 0;
            animation: waveFlow 2.4s ease-in-out infinite alternate;
            will-change: transform;
            pointer-events: none;
        }
        .slider-fill.slosh .wave {
            animation: slosh 0.6s ease-in-out;
        }
        @keyframes waveFlow {
            0% {
                transform: translateX(-8px) scaleY(0.8);
            }
            100% {
                transform: translateX(8px) scaleY(1.2);
            }
        }
        @keyframes slosh {
            0% {
                transform: translateX(-20px) scaleY(1.4);
            }
            30% {
                transform: translateX(20px) scaleY(0.6);
            }
            60% {
                transform: translateX(-12px) scaleY(1.2);
            }
            100% {
                transform: translateX(0) scaleY(1);
            }
        }

        /* ── Handle ── */
        .slider-handle {
            position: absolute;
            left: 50%;
            width: 28px;
            height: 28px;
            margin-left: -14px;
            border-radius: 50%;
            background: var(--surface);
            border: 3px solid var(--navy);
            box-shadow: var(--shadow2), 0 0 0 2px var(--surface);
            transform: translateY(-50%);
            touch-action: none;
            cursor: grab;
            transition: border-color var(--transition), transform 0.15s ease;
            z-index: 10;
            will-change: transform;
        }
        .slider-handle:active {
            cursor: grabbing;
            transform: translateY(-50%) scale(1.12);
            border-color: var(--gold);
        }
        .slider-handle::after {
            content: '';
            position: absolute;
            inset: 4px;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 35%, rgba(255, 255, 255, 0.6) 0%, transparent 70%);
            pointer-events: none;
        }

        /* ── Markers ── */
        .markers {
            position: absolute;
            right: -44px;
            top: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 4px 0;
            pointer-events: none;
        }
        .marker {
            font-size: 0.55rem;
            font-weight: 700;
            color: var(--text3);
            letter-spacing: 0.04em;
            line-height: 1;
            text-align: left;
            opacity: 0.6;
            transition: color var(--transition);
        }
        .marker.active {
            color: var(--navy);
            opacity: 1;
            font-weight: 800;
        }

        /* ── Water & Waste specific colours ── */
        .tank.water .slider-fill {
            --water-color: #1A85C7;
            --water-light: #7BC8F0;
        }
        .tank.waste .slider-fill {
            --water-color: #8B5A2B;
            --water-light: #C49A6C;
        }
        [data-theme="jarvis"] .tank.water .slider-fill {
            --water-color: #00B4D8;
            --water-light: #80E0FF;
        }
        [data-theme="jarvis"] .tank.waste .slider-fill {
            --water-color: #4DD0E1;
            --water-light: #A8E6CF;
        }
        [data-theme="cyberpunk"] .tank.water .slider-fill {
            --water-color: #FF007F;
            --water-light: #FF66B2;
        }
        [data-theme="cyberpunk"] .tank.waste .slider-fill {
            --water-color: #00FFD1;
            --water-light: #66FFE0;
        }

        /* ── Warning message ── */
        .warning-msg {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--danger);
            background: rgba(211, 47, 47, 0.08);
            padding: 3px 10px;
            border-radius: 20px;
            border: 1px solid var(--danger);
            margin-top: 8px;
            display: none;
            align-items: center;
            gap: 4px;
            animation: fadeWarning 0.25s ease;
        }
        .warning-msg.show {
            display: inline-flex;
        }
        @keyframes fadeWarning {
            0% {
                opacity: 0;
                transform: translateY(-6px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ══════════════════════════════════════════
           SUMMARY BUTTON
        ══════════════════════════════════════════ */
        .summary-area {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            justify-content: center;
            border-top: 1px solid var(--border);
            padding-top: 18px;
            margin-top: 4px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 20px;
            border: none;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.8rem;
            font-family: 'Inter', sans-serif;
            background: var(--navy);
            color: #fff;
            box-shadow: var(--shadow);
            transition: all var(--transition);
            cursor: pointer;
            letter-spacing: 0.02em;
        }
        .btn:hover {
            background: var(--navy3);
            transform: translateY(-2px);
            box-shadow: var(--shadow2);
        }
        .btn:active {
            transform: translateY(0);
        }
        .btn .icon {
            font-size: 1rem;
        }
        .btn .badge {
            font-size: 0.55rem;
            background: rgba(255, 255, 255, 0.2);
            padding: 2px 8px;
            border-radius: 20px;
            font-weight: 600;
        }
        .btn.gold {
            background: var(--gold);
            color: var(--navy2);
        }
        .btn.gold:hover {
            background: var(--gold2);
        }

        .toast-msg {
            font-size: 0.75rem;
            color: var(--gold);
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .toast-msg.show {
            opacity: 1;
        }

        /* ══════════════════════════════════════════
           MOBILE OPTIMISATIONS
        ══════════════════════════════════════════ */
        @media (max-width: 600px) {
            body {
                padding: 10px;
            }
            .container {
                padding: 16px 12px 20px;
            }
            .header h1 {
                font-size: 1rem;
            }
            .header .sub {
                font-size: 0.6rem;
            }

            .flight-selector {
                padding: 8px 10px;
                gap: 6px;
                flex-wrap: wrap;
            }
            .flight-selector label {
                font-size: 0.65rem;
            }
            .flight-selector input,
            .flight-selector select {
                font-size: 0.75rem;
                padding: 5px 8px;
                min-width: 80px;
                flex: 1 1 80px;
            }
            /* Give dropdown more room on mobile */
            .flight-selector select {
                flex: 2 1 100px;
                min-width: 90px;
            }
            .flight-selector .btn-check {
                font-size: 0.65rem;
                padding: 4px 12px;
            }
            .flight-selector .req-badge {
                font-size: 0.6rem;
                padding: 2px 10px;
            }

            .tank-grid {
                grid-template-columns: 1fr 1fr;
                gap: 12px;
            }

            .slider-wrapper {
                width: 38px;
                height: 180px;
            }
            .slider-handle {
                width: 22px;
                height: 22px;
                margin-left: -11px;
                border-width: 2px;
            }
            .markers {
                right: -34px;
            }
            .marker {
                font-size: 0.5rem;
            }

            .tank-value {
                font-size: 1.1rem;
                min-width: 50px;
                padding: 0 8px;
            }
            .tank-label {
                font-size: 0.65rem;
            }
            .tank-label .req-text {
                font-size: 0.5rem;
                padding: 0 6px;
            }
            .warning-msg {
                font-size: 0.6rem;
                padding: 2px 8px;
                margin-top: 6px;
            }

            .summary-area {
                padding-top: 14px;
                gap: 8px;
            }
            .btn {
                font-size: 0.7rem;
                padding: 6px 14px;
            }
            .btn .badge {
                font-size: 0.5rem;
                padding: 1px 6px;
            }
            .toast-msg {
                font-size: 0.65rem;
            }
        }

        @media (max-width: 400px) {
            .tank-grid {
                gap: 8px;
            }
            .slider-wrapper {
                width: 32px;
                height: 150px;
            }
            .slider-handle {
                width: 18px;
                height: 18px;
                margin-left: -9px;
            }
            .markers {
                right: -28px;
            }
            .marker {
                font-size: 0.4rem;
            }
            .tank-value {
                font-size: 0.9rem;
                min-width: 40px;
            }
            .flight-selector input,
            .flight-selector select {
                min-width: 60px;
                flex: 1 1 60px;
                font-size: 0.7rem;
            }
            .flight-selector select {
                flex: 2 1 70px;
                min-width: 70px;
            }
        }
    </style>
</head>
<body>

    <div class="container" id="app">
        <!-- Header -->
        <div class="header">
            <h1>Checklist <em>22</em></h1>
            <span class="sub">💧 Flight Water Monitor</span>
        </div>

        <!-- Flight Selector – emojis removed for more space -->
        <div class="flight-selector">
            <label>Flight</label>
            <input type="text" id="flightInput" placeholder="e.g. MH081 or 081" />
            <label>Aircraft</label>
            <select id="aircraftSelect">
                <option value="b737">B737-800</option>
                <option value="a330_200">A330-200</option>
                <option value="a330_300">A330-300</option>
                <option value="a350">A350-900</option>
            </select>
            <button class="btn-check" id="checkMinBtn">✔️ Check</button>
            <span class="req-badge" id="reqBadge">Req: N/A</span>
        </div>

        <!-- Tank Grid -->
        <div class="tank-grid">
            <!-- Water Tank -->
            <div class="tank water" id="tankWater">
                <div class="tank-label">
                    <span class="icon">💧</span> Water
                    <span class="req-text" id="waterReqText">min: —</span>
                </div>
                <div class="tank-value" id="waterValue">100%</div>
                <div class="slider-wrapper" id="waterSlider">
                    <div class="slider-fill" id="waterFill" style="height: 100%;">
                        <div class="wave"></div>
                    </div>
                    <div class="slider-handle" id="waterHandle" style="top: 0%;"></div>
                    <div class="markers">
                        <span class="marker" data-val="100">100</span>
                        <span class="marker" data-val="75">75</span>
                        <span class="marker" data-val="50">50</span>
                        <span class="marker" data-val="25">25</span>
                        <span class="marker" data-val="0">0</span>
                    </div>
                </div>
                <div class="warning-msg" id="waterWarning">⚠️ Below minimum!</div>
            </div>

            <!-- Waste Tank -->
            <div class="tank waste" id="tankWaste">
                <div class="tank-label"><span class="icon">🗑️</span> Waste</div>
                <div class="tank-value" id="wasteValue">0%</div>
                <div class="slider-wrapper" id="wasteSlider">
                    <div class="slider-fill" id="wasteFill" style="height: 0%;">
                        <div class="wave"></div>
                    </div>
                    <div class="slider-handle" id="wasteHandle" style="top: 100%;"></div>
                    <div class="markers">
                        <span class="marker" data-val="100">100</span>
                        <span class="marker" data-val="75">75</span>
                        <span class="marker" data-val="50">50</span>
                        <span class="marker" data-val="25">25</span>
                        <span class="marker" data-val="0">0</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Summary Area -->
        <div class="summary-area">
            <button class="btn gold" id="summarizeBtn">
                <span class="icon">📋</span> Summarize &amp; Copy
                <span class="badge">Ctrl+C</span>
            </button>
            <span class="toast-msg" id="toastMsg">✓ Copied!</span>
        </div>
    </div>

    <script>
        'use strict';

        //  STATE
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        const state = {
            water: 100,
            waste: 0,
            minRequirement: null,
            currentFlight: null,
            currentAircraft: 'b737',
        };

        // DOM refs
        const flightInput = document.getElementById('flightInput');
        const aircraftSelect = document.getElementById('aircraftSelect');
        const reqBadge = document.getElementById('reqBadge');
        const waterReqText = document.getElementById('waterReqText');

        const waterSlider = document.getElementById('waterSlider');
        const wasteSlider = document.getElementById('wasteSlider');
        const waterFill = document.getElementById('waterFill');
        const wasteFill = document.getElementById('wasteFill');
        const waterHandle = document.getElementById('waterHandle');
        const wasteHandle = document.getElementById('wasteHandle');
        const waterValue = document.getElementById('waterValue');
        const wasteValue = document.getElementById('wasteValue');
        const waterWarning = document.getElementById('waterWarning');
        const checkMinBtn = document.getElementById('checkMinBtn');

        const summarizeBtn = document.getElementById('summarizeBtn');
        const toastMsg = document.getElementById('toastMsg');

        const snapPoints = [0, 25, 50, 75, 100];

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  THEME SYNC
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        function syncTheme() {
            const params = new URLSearchParams(window.location.search);
            const theme = params.get('theme') || 'ops';
            document.body.setAttribute('data-theme', theme);
            localStorage.setItem('dashboard_theme', theme);
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  FLIGHT / AIRCRAFT LOGIC
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        function normalizeFlight(input) {
            let raw = input.trim().toUpperCase();
            let num = raw.replace(/^MH\s*/, '').replace(/\s+/g, '');
            if (!num) return null;
            return 'MH' + num;
        }

        function getRequirement(flightKey, aircraftKey) {
            if (!flightKey || !waterData[flightKey]) return null;
            const entry = waterData[flightKey];
            const val = entry[aircraftKey];
            if (val === undefined || val === null) return null;
            if (val === 'NA') return null;
            if (val === 'FULL') return 100;
            const parsed = parseInt(val, 10);
            return isNaN(parsed) ? null : parsed;
        }

        function updateFlightData() {
            const raw = flightInput.value;
            const key = normalizeFlight(raw);
            const aircraft = aircraftSelect.value;

            state.currentFlight = key;
            state.currentAircraft = aircraft;

            let req = null;
            let displayText = 'N/A';
            let isNa = true;

            if (key && waterData[key]) {
                req = getRequirement(key, aircraft);
                if (req !== null) {
                    displayText = req + '%';
                    isNa = false;
                } else {
                    displayText = 'N/A';
                    isNa = true;
                }
            } else {
                displayText = 'N/A';
                isNa = true;
            }

            state.minRequirement = req;
            reqBadge.textContent = 'Req: ' + displayText;
            reqBadge.classList.toggle('na', isNa);
            waterReqText.textContent = 'min: ' + displayText;

            validateWater();
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  VALIDATION
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        function validateWater() {
            const req = state.minRequirement;
            const current = state.water;
            const warningEl = waterWarning;
            const valueEl = waterValue;

            if (req !== null && current < req) {
                warningEl.classList.add('show');
                valueEl.classList.add('warning');
            } else {
                warningEl.classList.remove('show');
                valueEl.classList.remove('warning');
            }
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  SLIDER ENGINE
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        function getSliderConfig(sliderEl) {
            const isWater = sliderEl.id === 'waterSlider';
            return {
                isWater,
                fill: isWater ? waterFill : wasteFill,
                handle: isWater ? waterHandle : wasteHandle,
                valueEl: isWater ? waterValue : wasteValue,
                getCurrent: () => isWater ? state.water : state.waste,
                setState: (v) => {
                    if (isWater) state.water = v;
                    else state.waste = v;
                },
                label: isWater ? 'Water' : 'Waste',
            };
        }

        function updateSlider(sliderEl, percent) {
            const cfg = getSliderConfig(sliderEl);
            const clamped = Math.max(0, Math.min(100, percent));
            const rounded = Math.round(clamped);

            cfg.setState(rounded);

            const fillHeight = rounded;
            cfg.fill.style.height = fillHeight + '%';
            const handleTop = 100 - rounded;
            cfg.handle.style.top = handleTop + '%';
            cfg.valueEl.textContent = rounded + '%';

            // Update markers
            const sliderRect = sliderEl.getBoundingClientRect();
            const totalHeight = sliderRect.height;
            const fillPx = (rounded / 100) * totalHeight;
            const fillTop = sliderRect.bottom - fillPx;

            const markers = sliderEl.querySelectorAll('.marker');
            markers.forEach(m => {
                const val = parseInt(m.dataset.val);
                const markerY = sliderRect.top + (1 - val / 100) * totalHeight;
                const dist = Math.abs(markerY - fillTop);
                m.classList.toggle('active', dist < 12);
            });

            if (cfg.isWater) {
                validateWater();
            }
        }

        function snapToNearest(value) {
            let closest = snapPoints[0];
            let minDiff = Math.abs(value - closest);
            for (const p of snapPoints) {
                const diff = Math.abs(value - p);
                if (diff < minDiff) {
                    minDiff = diff;
                    closest = p;
                }
            }
            return closest;
        }

        function setupSlider(sliderEl) {
            let isDragging = false;
            let cfg = getSliderConfig(sliderEl);

            function getPercentFromEvent(e) {
                const rect = sliderEl.getBoundingClientRect();
                const clientY = e.clientY ?? e.touches?.[0]?.clientY ?? 0;
                const relativeY = (clientY - rect.top) / rect.height;
                const percent = 100 - Math.max(0, Math.min(1, relativeY)) * 100;
                return Math.max(0, Math.min(100, percent));
            }

            function onStart(e) {
                e.preventDefault();
                isDragging = true;
                sliderEl.style.cursor = 'grabbing';
                cfg.fill.classList.remove('slosh');
                const percent = getPercentFromEvent(e);
                const rounded = Math.round(percent);
                updateSlider(sliderEl, rounded);
            }

            function onMove(e) {
                if (!isDragging) return;
                e.preventDefault();
                const percent = getPercentFromEvent(e);
                const rounded = Math.round(percent);
                updateSlider(sliderEl, rounded);
            }

            function onEnd(e) {
                if (!isDragging) return;
                isDragging = false;
                sliderEl.style.cursor = 'default';

                const current = cfg.getCurrent();
                const snapped = snapToNearest(current);
                if (snapped !== current) {
                    updateSlider(sliderEl, snapped);
                }

                cfg.fill.classList.remove('slosh');
                void cfg.fill.offsetWidth;
                cfg.fill.classList.add('slosh');

                const markers = sliderEl.querySelectorAll('.marker');
                markers.forEach(m => {
                    const val = parseInt(m.dataset.val);
                    m.classList.toggle('active', val === snapped);
                });
            }

            sliderEl.addEventListener('mousedown', onStart);
            document.addEventListener('mousemove', onMove);
            document.addEventListener('mouseup', onEnd);

            sliderEl.addEventListener('touchstart', onStart, { passive: false });
            document.addEventListener('touchmove', onMove, { passive: false });
            document.addEventListener('touchend', onEnd, { passive: false });

            sliderEl.querySelectorAll('.marker').forEach(marker => {
                marker.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const val = parseInt(marker.dataset.val);
                    updateSlider(sliderEl, val);
                    cfg.fill.classList.remove('slosh');
                    void cfg.fill.offsetWidth;
                    cfg.fill.classList.add('slosh');
                });
            });

            const initial = cfg.getCurrent();
            updateSlider(sliderEl, initial);
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  SUMMARY & COPY
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        function getSummary() {
            const flight = state.currentFlight || 'N/A';
            const aircraftLabel = aircraftSelect.options[aircraftSelect.selectedIndex]?.text || 'N/A';
            const waterLevel = state.water;
            const minReq = state.minRequirement;
            const wasteLevel = state.waste;

            let waterLine = `Water level: ${waterLevel}%`;
            if (minReq !== null) {
                waterLine += ` (min requirements ${minReq}%)`;
            } else {
                waterLine += ` (min requirements N/A)`;
            }

            return `${flight} (${aircraftLabel}) – ${waterLine} | Waste level: ${wasteLevel}%`;
        }

        function copySummary() {
            const text = getSummary();
            navigator.clipboard.writeText(text).then(() => {
                toastMsg.textContent = '✓ Copied!';
                toastMsg.classList.add('show');
                setTimeout(() => toastMsg.classList.remove('show'), 2000);
            }).catch(() => {
                const ta = document.createElement('textarea');
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                toastMsg.textContent = '✓ Copied!';
                toastMsg.classList.add('show');
                setTimeout(() => toastMsg.classList.remove('show'), 2000);
            });
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  INIT
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        function init() {
            syncTheme();

            setupSlider(waterSlider);
            setupSlider(wasteSlider);

            flightInput.addEventListener('input', updateFlightData);
            aircraftSelect.addEventListener('change', updateFlightData);

            checkMinBtn.addEventListener('click', () => {
                validateWater();
                checkMinBtn.style.transform = 'scale(0.96)';
                setTimeout(() => checkMinBtn.style.transform = '', 150);
            });

            summarizeBtn.addEventListener('click', copySummary);

            document.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'c') {
                    const tag = document.activeElement?.tagName || '';
                    if (!['INPUT', 'TEXTAREA', 'SELECT'].includes(tag)) {
                        e.preventDefault();
                        copySummary();
                    }
                }
            });

            // Pre‑fill with MH081 as demo
            flightInput.value = 'MH081';
            aircraftSelect.value = 'b737';
            updateFlightData();

            console.log('💧 Checklist 22 + Flight Monitor ready');
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>

</body>
</html>
